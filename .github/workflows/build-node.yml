name: build-node
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Needed by the tag-and-release step (git push of the version tag + gh release).
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout middleware
        uses: actions/checkout@v4

      - name: Checkout panel (for EF migrations)
        uses: actions/checkout@v4
        with:
          repository: allansalgadocr/ticolinea.panel
          ref: master
          path: _panel
          token: ${{ secrets.PANEL_REPO_TOKEN }}

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Publish (framework-dependent)
        run: |
          dotnet publish Ticolinea.Streaming.Middleware/ticolinea.stream.service.csproj \
            -c Release -o publish

      - name: Strip non-provider configs from the artifact
        run: rm -f publish/appsettings.main.json publish/appsettings.fibraencasa.json publish/appsettings.Development.json

      - name: Generate idempotent schema
        run: |
          dotnet tool install --global dotnet-ef --version 6.*
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef migrations script --idempotent \
            --project _panel/ticolinea.panel.Infrastructure \
            --startup-project _panel/ticolinea.panel.API \
            -o publish/schema.sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ steps.ver.outputs.version }}
          path: publish/
          retention-days: 30

      # Every VERSION bump gets a permanent, traceable release: an annotated
      # node-vX.Y.Z tag on the exact built commit, plus a GitHub Release with
      # the artifact attached (Releases never expire; run artifacts die at 30
      # days). Idempotent: an existing tag skips everything, so rebuilds of
      # the same version never fight. Tag prefix 'node-v' avoids the legacy
      # v1.0.6-era tag namespace.
      - name: Tag and release this version
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="$(cat VERSION)"
          tag="node-v$ver"
          if [ -n "$(git ls-remote --tags origin "refs/tags/$tag")" ]; then
            echo "$tag already exists — skipping tag/release"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "node $ver (automated from build-node)"
          git push origin "$tag"
          (cd publish && zip -qr "../node-$ver.zip" .)
          gh release create "$tag" "node-$ver.zip" \
            --title "node $ver" \
            --notes "Automated node artifact for version $ver. Deploy: unzip, then ./deploy/tico deploy <slug> --tag $ver --artifact <dir>"
